version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: archflow_ai_backend:latest
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - JAVA_OPTS

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: archflow_ai_frontend:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend